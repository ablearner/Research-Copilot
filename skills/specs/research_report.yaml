{
  "name": "research_report",
  "description": "Research report reading skill with vector-first hybrid retrieval and structured evidence response.",
  "applicable_tasks": [
    "ask_document",
    "function_call"
  ],
  "prompt_set": {
    "answer_prompt_path": "prompts/document/answer_question_with_hybrid_rag.txt",
    "rewrite_prompt_path": "prompts/retrieval/rewrite_query.txt"
  },
  "preferred_tools": [
    "hybrid_retrieve",
    "query_graph_summary",
    "answer_with_evidence",
    "search_or_import_paper"
  ],
  "retrieval_policy": {
    "mode": "hybrid",
    "top_k": 12,
    "graph_query_mode": "auto",
    "enable_graph_summary": true,
    "filters": {
      "domain": "research_report"
    }
  },
  "memory_policy": {
    "use_session_context": true,
    "use_task_context": true,
    "use_preference_context": true,
    "use_retrieval_cache_summary": true,
    "include_memory_hints": true
  },
  "output_style": {
    "language": "zh-CN",
    "detail_level": "detailed",
    "tone": "research_factual"
  },
  "metadata": {
    "skill_family": "research",
    "allowed_external_mcp_tools": [
      "zotero_ping",
      "zotero_get_selected_collection",
      "zotero_list_collections",
      "zotero_search_items",
      "zotero_get_item_attachments",
      "zotero_import_paper",
      "zotero_attach_pdf_to_item"
    ]
  },
  "enabled": true
}
