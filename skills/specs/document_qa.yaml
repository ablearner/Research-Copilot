{
  "name": "document_qa",
  "description": "General document question answering skill for mixed text/chart/graph evidence.",
  "applicable_tasks": [
    "ask_document",
    "function_call"
  ],
  "prompt_set": {
    "answer_prompt_path": "prompts/document/answer_question_with_hybrid_rag.txt",
    "rewrite_prompt_path": "prompts/retrieval/rewrite_query.txt"
  },
  "preferred_tools": [
    "parse_document",
    "hybrid_retrieve",
    "query_graph_summary",
    "answer_with_evidence"
  ],
  "retrieval_policy": {
    "mode": "hybrid",
    "top_k": 10,
    "graph_query_mode": "auto",
    "enable_graph_summary": true
  },
  "memory_policy": {
    "use_session_context": true,
    "use_task_context": true,
    "use_preference_context": true,
    "use_retrieval_cache_summary": true,
    "include_memory_hints": true
  },
  "output_style": {
    "language": "zh-CN",
    "detail_level": "normal",
    "tone": "concise_factual"
  },
  "enabled": true
}
